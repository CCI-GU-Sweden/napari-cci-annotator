name: tests

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.platform }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 20

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - platform: macos-latest
            python-version: "3.12"
          - platform: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: tlambert03/setup-qt-libs@v1

      - name: Setup Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true

      - name: Install package
        run: |
          uv pip install -e .
          uv pip install "napari[all]"

      - name: Smoke test imports
        run: |
          python -c "import napari_cci_annotator; print(napari_cci_annotator.__version__)"
          python -c "from napari_cci_annotator._widget import CciAnnotatorQWidget"

  build:
    name: Build package
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Upload built package
        uses: actions/upload-artifact@v6
        with:
          name: Packages
          path: dist/*

  deploy:
    name: Publish to PyPI
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/napari-cci-annotator2

    permissions:
      id-token: write

    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1